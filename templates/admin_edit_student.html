{% extends "base.html" %}
{% block title %}Edit Student | Admin{% endblock %}

{% block content %}
<div class="page-head">
  <p class="eyebrow">Admin Panel</p>
  <h1>Edit Student Profile</h1>
  <p>{{ student.name }} ({{ student.email }}) ki profile complete/update karein.</p>
</div>

<div class="form-card" style="max-width: 640px;">
  <form method="POST" action="{{ url_for('edit_student', student_id=student.id) }}">
    <div class="form-row-2">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" value="{{ student.name }}" required>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" value="{{ student.email }}" disabled>
      </div>
    </div>

    <div class="form-row-2">
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" value="{{ student.phone or '' }}">
      </div>
      <div class="form-group">
        <label for="course">Course</label>
        <select id="course" name="course">
          <option value="" {% if not student.course %}selected{% endif %}>Select Course</option>
          {% for c in ['UPSC CSE Foundation', 'UP-PCS Combo Course', 'Optional Subjects', 'Daily Current Affairs & Test Series'] %}
            <option {% if student.course == c %}selected{% endif %}>{{ c }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="form-row-2">
      <div class="form-group">
        <label for="batch">Batch</label>
        <input type="text" id="batch" name="batch" value="{{ student.batch or '' }}" placeholder="e.g. Morning Batch - 2026">
      </div>
      <div class="form-group">
        <label for="fees_status">Fees Status</label>
        <select id="fees_status" name="fees_status">
          <option value="" {% if not student.fees_status %}selected{% endif %}>Select Status</option>
          <option {% if student.fees_status == 'Paid' %}selected{% endif %}>Paid</option>
          <option {% if student.fees_status == 'Pending' %}selected{% endif %}>Pending</option>
          <option {% if student.fees_status == 'Partial' %}selected{% endif %}>Partial</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label for="address">Address</label>
      <textarea id="address" name="address" rows="2" placeholder="Student's address">{{ student.address or '' }}</textarea>
    </div>

    <div class="form-group">
      <label for="notes">Admin Notes</label>
      <textarea id="notes" name="notes" rows="3" placeholder="Internal notes about this student (not visible to student)">{{ student.notes or '' }}</textarea>
    </div>

    <div class="form-group">
      <label for="new_password">Reset Password</label>
      <input type="password" id="new_password" name="new_password" placeholder="Leave blank to keep current password">
    </div>

    <div style="display:flex; gap: 12px;">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="{{ url_for('admin_students') }}" class="btn btn-outline-sm" style="border-color: var(--color-navy); color: var(--color-navy);">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
