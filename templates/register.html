{% extends "base.html" %}
{% block title %}Register | Prashasti IAS Academy{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-header">
    <div class="auth-mark">अ</div>
    <h1>Create Your Account</h1>
    <p>Register to access study material and submit feedback</p>
  </div>

  <form method="POST" action="{{ url_for('register') }}">
    <div class="form-group">
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" placeholder="Your full name" required>
    </div>

    <div class="form-row-2">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="10-digit number">
      </div>
    </div>

    <div class="form-group">
      <label for="course">Course Interested In</label>
      <select id="course" name="course">
        <option value="">Select Course</option>
        <option>UPSC CSE Foundation</option>
        <option>UP-PCS Combo Course</option>
        <option>Optional Subjects</option>
        <option>Daily Current Affairs & Test Series</option>
      </select>
    </div>

    <div class="form-row-2">
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>
      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
      </div>
    </div>

    <button type="submit" class="btn btn-primary btn-block">Create Account</button>
  </form>

  <div class="auth-footer">
    <p>Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
  </div>
</div>
{% endblock %}
